淨常得見佛不離世尊常聞妙法常聽正法生不退地師子勝人而得親近不相遠離無盡無減海印出妙功德陀羅尼無盡無減衆生意行言語通達陀羅尼無盡無減日圓無垢相光陀羅尼無盡無減滿月相光陀羅尼無盡無減能伏一切惑事功德流陀羅尼無盡無減破壞堅固金剛山陀羅尼無盡無減說不可說義因緣藏陀羅尼無盡無減真實語言法則音聲通達陀羅尼無盡無減虛空無垢心行印陀羅尼無盡無減無邊佛身能顯現陀羅尼善男子如是諸陀羅尼等得成就故菩薩摩訶薩於十方一切佛土諸化佛身說無上種種正法於法如如不動不去不來善能成熟一切衆生善根亦不見一切衆生可成熟者說種種諸法於諸言辭不動不去不住不來能現生滅向無生滅說諸行法無所去來一切法無異故說是金光明經已三萬億菩薩摩訶薩得無生法忍無量諸菩薩不退菩提心無量無邊比丘得法眼淨無量衆生發菩薩心是時世尊而說偈言逆生死流道甚深微難見貪欲覆衆生愚冥暗不見是時大會之衆從座而起偏袒右肩右膝著地合掌恭敬頂禮佛足而白佛言若有處處講宣此金光明經是會大衆皆悉往彼為作聽衆是說法師種種利益安樂無障身心泰然我等皆當盡心供養令諸聽衆安隱快樂是所國土無諸怨賊恐怖之難無飢饉畏無非人畏人民興盛是說法處一切諸天人非人等及諸衆生不得從上而過污漫說法之處何以故說法之處即是其塔善男子善女人應當以諸香華繒綵幡蓋供養是說法處我等為作救護利益消除一切障礙隨其所須如意供給悉令具足佛言善男子如是汝等應當精勤修行如此經典則法久住於世生死怖畏無明故是初地障礙微細罪過因無明種種業行相因無明故是二地障業所未得勝利得故動涌因無明故不具聞持陀羅尼因無明是二無明說三地障味禪定樂生愛著心無明作因是四地障一意欲入涅槃思惟一意欲入生死思惟是涅槃思惟是生死思惟無明為因生死涅槃不平等思惟無明為因是第五地障行法相續了了顯現無明為因法相數數行至於心無明為因是第六地障微細諸相或現不現無明為因一味熟思惟欲斷未得方便無明為因是七地障於無相法多用功力無明為因執相自在難可得度無明為因依二種麁心是八地障說法無量名味句無量智慧分別無量未能攝持無明為因四無礙辨未得自在無明為因依二種麁心是第九地障最大神通未得如意無明為因微妙祕密之藏修行未足無明為因依二種麁心是第十地障一切境界微細智礙無明為因未來是礙不更生未得不更生智無明為因是如來地障哆姪他天可切後九句並同此一富樓抳念履切下抳並同此二那羅提音弟三豆平聲吼豆吼豆吼四耶移我切跋修履瑜五烏婆娑底知履切六耶同上跋旃陀上聲魯七提同上瑜多底八哆跋鐸駱懺霜𦡶切九檀地途買切波履訶嵐羅含切十苟留良吼切十一莎平聲訶上聲十二多姪他一鬱坐殊果切離音戾二旨平聲履旨履三鬱社邏去聲四社邏南上聲五禪斗禪斗六鬱坐離同上七吼柳吼柳八莎訶九哆姪他一檀地並同前音枳二般六限切陀上聲枳三柯羅智知爾切四高懶二合智五枳由詈六檀知上聲詈七莎訶八哆姪他一尸利尸利二陀彌抳陀彌抳三陀履陀履抳四尸履尸履抳五陛捨申俄切邏婆細音灑六波豕那七盤陀訶上聲寐無死切底八莎訶九哆姪他一訶里訶里抳二遮履遮履尼三迦邏摩抳四僧迦邏摩抳五三婆訶沙抳六剡常琰切婆訶𢴧七悉耽婆訶抳八謨訶抳九莎琰部吼陛十莎訶十一哆姪他一毗頭詈毗頭詈二摩履抳三柯履柯履四苾浮必切頭誘訶底五溜溜溜溜囀音呼六周柳周柳七杜魯婆杜魯婆八遮申俄切遮遮同上者章我切九婆栗沙使下切十薩相脫切活二合急呼祇底知履切十一薩婆薩埵南十二悉遲遐香家切斗十三曼無丹切多羅波拖十四莎訶十五哆姪他一闍訶闍訶漏良後切二闍訶闍訶闍訶漏同上三鞞柳枳鞞柳枳四阿蜜多邏伽訶多抳五婆力灑抳六鞞柳恥枳七婆柳波底八鞞提喜枳九頻陀鞞履抳十蜜栗呾底枳十一蒲呼酉蒲呼酉十二莎訶十三哆姪他一死履二合急呼死履二始履小緩呼尼三寐無死切底寐底四柯履柯履五訶履訶履六醯柳醯柳七周柳周柳八伴平聲陀訶寐同上九莎訶十哆姪他一訶履旃柁徒可切履枳二俱嵐婆邏梯他弟切三斗邏死四拔吒拔吒死五死履死履六柯死履七柯補音比修履八薩相脫切活二合祇底九薩婆薩埵南平聲十莎訶十一哆姪他一悉提醯訶弟切下三同二修悉提醯三姥者禰年弟切四姥差楚解切禰同上五毗目底六阿摩詈留弟切下同七毗摩詈八涅摩詈九瞢望恆切伽詈十喜懶若如也切竭奇達切刺留達切二合急呼陛醯十一何刺那竭刺陛醯十二娑曼多跋竭提詈十三薩跋刺他聽我切娑陀呵虎可切禰十四摩那死十五摩訶摩那死十六遏部吼底十七遏哲部吼底十八婆邏提上聲十九毗邏提二十遏周底二十一阿美里底二十二阿邏是二十三毗邏是二十四婆覽訶寐忘己切二十五婆覽摩須詈二十六富婁禰二十七富婁那摩怒邏體二十八莎訶二十九
