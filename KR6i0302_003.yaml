body:
  text: 隋大興善寺沙門釋寶貴合梁三藏真諦譯陀羅尼最淨地品第六是時師子相無礙光焰菩薩與無量億衆從座俱起偏袒右肩右膝著地合掌恭敬頂禮佛足以種種華香寶幢幡蓋以為供養而作是言以幾因緣得菩提心何者是菩提心世尊於菩提者現在心不可得未來心不可得過去心不可得離菩提者菩提心亦不可得菩提者不可言說心者亦無色無相無事無業非可造作衆生者亦不可得亦不可知世尊云何諸法甚深之義而可得知佛言善男子菩提祕密事業造作不可得知離菩提菩提心亦不可得菩提者不可言說心亦無相衆生亦不可得知何以故如意心亦如是如心菩提亦如是如心如菩提衆生亦如是如衆生一切三世法亦如是佛言善男子如是菩薩摩訶薩得名是心通一切法是說菩提菩提心菩提非過去非未來非現在心亦如是衆生亦如是於如此中亦不可得何以故一切法無生故菩提不可得菩提名不可得衆生衆生名不可得聲聞聲聞名不可得緣覺緣覺名不可得菩薩菩薩名不可得佛佛名不可得行非行不可得行非行名不可得於一切寂靜法中而得安住依一切功德善根而得發出是名初發菩提心譬如寶須彌山王是名檀波羅蜜因第二發心譬如大地持一一法事故是名尸波羅蜜因譬如師子臆長毫獸王有大神力獨步無畏無有戰怖如是第三心說羼提波羅蜜因譬如風輪那羅延力勇壯速疾如是第四心不退轉是名毗梨耶波羅蜜因譬如七寶樓觀有四階道清涼之風來吹四門如是第五心上種種功德法藏猶未滿足是名禪波羅蜜因譬如日輪光耀炎盛如是第六心能破滅生死大暗故是名般若波羅蜜因譬如大富商主能令一切心願滿足如是第七心能令得度生死險惡道故能令得多功德寶故是名方便勝智波羅蜜因譬如月淨圓滿如是第八心一切境界清淨具足故是名願波羅蜜因譬如轉輪聖王主兵寶臣如意處分如是第九心善能莊嚴清淨佛土功德普洽廣利一切故是名力波羅蜜因譬如虛空及轉輪聖王如是第十心於一切境界皆悉通達故於一切法自在至灌頂位故是名智波羅蜜因佛言善男子如是十種菩薩摩訶薩菩提心因佛言善男子依五種法成就菩薩摩訶薩檀波羅蜜何者為五一者信根二者慈悲三者無求欲心四者攝受一切衆生五者願求一切智智是善男子依是五法檀波羅蜜能得成就佛言善男子依是五法菩薩摩訶薩成就尸波羅蜜何者為五一者三業清淨二者不為一切衆生作煩惱因緣三者斷諸惡道開善道門四者過於聲聞緣覺之地五者一切功德願滿足故善男子依是五法尸波羅蜜能得成就佛言善男子又依五法菩薩摩訶薩成就羼提波羅蜜何者為五一者伏貪瞋煩惱二者不惜身命不生安樂止息之觀三者思惟往業四者為欲成熟一切衆生功德善根發慈悲心五者為得甚深無生法忍善男子是名菩薩摩訶薩成就羼提波羅蜜佛言善男子又依五法菩薩摩訶薩成就毗梨耶波羅蜜何等為五一者與諸煩惱不得共住二者福德未具不得安樂三者一切難行不生厭心四者為欲利益一切衆生成就大慈悲攝受五者願求不退轉地善男子是名菩薩摩訶薩成就毗梨耶波羅蜜佛言善男子又依五法成就菩薩摩訶薩禪那波羅蜜何等為五一者一切善法攝持不散二者解脫生死二處不著三者願得神通為成就衆生善根故四者發心洗浣法界為清淨心故五者為斷衆生一切煩惱根故善男子是名菩薩摩訶薩成就禪那波羅蜜佛言善男子又有五法菩薩摩訶薩成就般若波羅蜜云何為五一者一切諸佛菩薩聰慧大智供養親近心無厭足二者諸佛如來說甚深法心常樂聞無有厭足三者真俗勝智四者見思煩惱如是勝智能分別斷五者於世間五明之法皆悉通達善男子是名菩薩摩訶薩成就般若波羅蜜佛言善男子又依五法菩薩摩訶薩成就方便勝智波羅蜜何者為五一者於一切衆生意欲煩惱行心悉通達二者無量對治諸法之門心皆曉了三者大慈大悲入出自在四者於摩訶波羅蜜多能修行成熟滿足悉皆願求五者一切佛法了達攝受皆悉願求善男子是名菩薩摩訶薩成就方便勝智波羅蜜佛言善男子又有五法菩薩摩訶薩成就願波羅蜜何者為五一者於一切法本來不生不滅不有不無心安樂住二者觀一切諸法最妙一切垢清淨心得安住三者過一切相心如如無作無行不異不動安心於如四者為利益衆生事於俗諦中得安心住五者於奢摩他毗鉢舍那同時能住善男子是名菩薩摩訶薩成就願波羅蜜佛言善男子依此五法菩薩摩訶薩成就力波羅蜜何者為五一者一切衆生心行險惡智力能解二者能令一切衆生入於甚深之法三者一切衆生往還生死隨其因緣如是見知四者於一切衆生三聚智力能分別知五者如理為種為熟為脫如是說法皆是智力故善男子是名菩薩摩訶薩成就力波羅蜜佛言善男子復有五法菩薩摩訶薩修行成就智波羅蜜何等為五一者於一切法分別善惡具足智能二者於黑白法遠離攝受具足智能三者於生死涅槃不厭不喜具足智能四者大福德行大智慧行得度究竟具足智能五者一切諸佛不共法等及一切智智具足灌頂智能善男子是名菩薩摩訶薩成就智波羅蜜佛言善男子何者波羅蜜義行道勝利是波羅蜜義大甚深智滿足是波羅蜜義行非行法心不執著是波羅蜜義生死過失涅槃功德正覺正觀是波羅蜜義愚人智人皆悉攝受是波羅蜜義能現種種珍妙法寶是波羅蜜義無礙解脫智滿足是波羅蜜義法界衆生界正分別知是波羅蜜義檀等及智能令至不退轉地是波羅蜜義能令滿足無生法忍是波羅蜜義一切衆生功德善根能令成熟是波羅蜜義於菩提清涼道場佛慧十力四無畏不共法等成就是波羅蜜義生死涅槃皆是妄見能度無餘是波羅蜜義濟度一切是波羅蜜義一切外人來相詰難善能解釋令其降伏是波羅蜜義能轉十二行法輪是波羅蜜義無所著無所見無患纍無異思惟是波羅蜜義善男子初菩薩地是相前現三千大千世界無量無邊種種寶物等藏皆悉盈滿菩薩悉見善男子菩薩二地是相前現三千大千世界地平如掌無量無數種種妙色清淨之寶莊嚴之具菩薩悉見善男子菩薩三地是相前現自身勇健鎧仗莊嚴一切怨賊皆能摧伏菩薩悉見善男子菩薩四地是相前現四方風輪種種妙華悉皆散灑圓滿地上菩薩悉見善男子菩薩五地是相前現如寶女人一切莊嚴其身頂上散多那華妙寶瓔珞貫飾身首菩薩悉見善男子菩薩六地是相前現七寶華池有四階道金沙遍滿清淨無穢八功德水皆悉盈滿鬱波羅花拘物頭華分陀利華莊嚴其池於華池所自身遊戲快樂清淨清涼無比菩薩悉見善男子菩薩七地是相前現左邊右邊應墮地獄以菩薩力故還得不墮無有損傷無有痛惱菩薩悉見善男子菩薩八地是相前現左邊右邊師子臆長毫獸王一切衆獸悉皆怖畏菩薩悉見善男子菩薩九地是相前現轉輪聖王無量億衆圍繞供養頂上白蓋無量衆寶之所莊嚴以覆於上菩薩悉見善男子菩薩十地是相前現如來之身金色晃耀無量淨光悉皆圓滿無量億梵王圍繞恭敬供養轉於無上微妙法輪菩薩悉見善男子云何初地而名歡喜得出世心昔所未得而今始得大事大用如意所願悉皆成就大歡喜慶樂故是故初地名為歡喜地一切微細之罪破戒過失皆清淨故是故二地說名無垢地無量智慧光明三昧不可傾動無能摧伏聞持陀羅尼為作本故是故三地說名明地能燒煩惱以智慧火增長光明是修行道品依處所故是故四地說名焰地是修行方便勝智自在難得故見思煩惱不可伏故是故五地說名難勝地行法相續了了顯現無相多思惟現前故是故六地說名現前地無漏無間無相思惟解脫三昧遠修行故是地清淨無障無礙是故七地說名遠行地無相正思惟修得自在諸煩惱行不能令動是故八地說名不動地說一切種種法而得自在無患纍故增長智慧自在無礙故是故九地說名善慧地法身如虛空智慧如大雲能令遍滿覆一切故是故第十名法雲地初地欲行有相道是無明障礙生死怖畏是無明依二種麁心是初地障微細罪過因無明種種業行相因無明依二種麁心是二地障昔所未得勝利得故動涌因無明不具聞持陀羅尼因無明依二種麁心是三地障味禪定樂生愛著心因無明微妙淨法愛因無明依二種麁心是四地障一意欲入涅槃思惟一意欲入生死思惟是涅槃思惟是生死思惟無明為因生死涅槃不平等思惟無明為因依二種麁心是五地障行法相續了了顯現無明為因法相數數行至於心無明為因依二種麁心是六地障微細諸相或現不現無明一味熟思惟欲斷未得方便無明依二種麁心是七地障於無相法多用功力無明執相自在難可得度無明依二種麁心是八地障說法無量名味句無量智慧分別無量未能攝持無明四無礙辨未得自在無明依二種麁心是九地障最大神通未得如意無明微妙祕密之藏修行未足無明依二種麁心是十地障一切境界微細智礙無明為因未來是礙不更生未得不更生智無明為因是如來地障是善男子於初菩薩地行向檀波羅蜜於二地行向尸波羅蜜於三地行向羼提波羅蜜四地行向毗梨耶波羅蜜五地行向禪那波羅蜜六地行向般若波羅蜜七地行向方便勝智波羅蜜八地行向願波羅蜜九地行向力波羅蜜十地行向智波羅蜜善男子菩薩摩訶薩初發心名妙寶起三摩提攝受得生第二發心可愛住三摩提攝受得生第三發心難動三摩提攝受得生第四發心不退轉三昧攝受得生第五發心寶華三昧攝受得生第六發心日圓光焰三昧攝受得生第七發心一切願如意成就三昧攝受得生第八發心現在佛現前證住三昧攝受得生第九發心智藏三昧攝受得生第十發心首楞嚴摩伽三昧攝受得生善男子是名諸菩薩摩訶薩十種發心善男子菩薩摩訶薩於此初地依功德力名陀羅尼得生爾時世尊而說呪曰怛姪他天可切後九篇初他字悉同此音其一富樓尼念履切後九篇音尼字悉同此音其二那羅弟吳音呼弟其三頭吼頭吼頭吼其四那移我切跋修履愈其五烏婆娑底知履切其六那移我切跋旃杜魯其七弟吳音呼弟愈多底吳音呼底其八多跋鐸洛衫霜艦切其九但地圖賣切波履訶嵐里含切其十苟留良吼切其十一鎖訶虎可切後九篇末訶字悉同此音其十二善男子是陀羅尼名過一恆河沙數諸佛為救護初地菩薩誦持此陀羅尼呪得度脫一切怖畏一切惡獸一切惡鬼人非人等災橫諸惱解脫五障不忘念初地善男子諸菩薩摩訶薩於此二地善安樂住名陀羅尼得生怛姪他其一鬱坐殊果切離良紙切其二脂履脂履其三鬱竪羅留我切其四竪羅留我切南泥感切其五禪斗禪斗鬱坐殊果切離良紙切其六吼柳吼柳其七鎖訶虎可切其八善男子是陀羅尼名過二恆河沙數諸佛為救護二地菩薩誦持此陀羅尼呪得度脫一切怖畏一切惡獸一切惡鬼人非人等怨賊災橫諸惱解脫五障不忘念二地善男子菩薩摩訶薩於此三地難勝大力名陀羅尼得生怛姪他其一但杝圖買切枳其二般方限切杝圖買切枳其三柯羅智知爾切其四高懶急囀音呼此兩字智知爾切其五枳由離良紙切其六但底知履切離良紙切其七鎖訶其八善男子是陀羅尼名過三恆河沙諸佛為救護三地菩薩誦持陀羅尼呪得度脫一切怖畏一切惡獸虎狼師子一切惡鬼人非人等怨賊災橫諸有惱害解脫五障不忘念三地善男子菩薩摩訶薩於此四地大利益