  - {type: variant, offset: 5649, length: 416, content: '爾時，釋迦牟尼佛從三昧起，現大神力，以右手摩諸大菩薩摩訶薩頂，與諸天王及龍王、二十八部散脂鬼神大將軍等，而作是言：「我於無量百千萬億恒河沙劫，修習是金光明微妙經典，汝等當受持、讀誦、廣宣此法，復於閻浮提內無令斷絕。若有善男子、善女人於未來世中，有受持、讀誦此經典者，汝等諸天常當擁護，當知是人於未來世無量百千人天之中常受快樂、於未來世值遇諸佛、疾得證成阿耨多羅三藐三菩提。」

      爾時，諸大菩薩及天、龍王、二十八部散脂大將等即從座起，到於佛前五體投地，俱發聲言：「如世尊勅，當具奉行。」如是三白：「如世尊勅，當具奉行。」於是，散脂大將軍而白佛言：「世尊！若後未來世中有受持是經，若自書、若使人書，我當與此二十八部諸鬼神等常當隨侍擁衛——隱蔽其形——是說法者，皆悉消滅諸惡，令得安隱，願不有慮。」

      爾時，釋迦牟尼佛現大神力，十方無量世界皆六種震動。是時諸佛皆大歡喜——囑累是經故——讚美持法者，現無量神力。於是無量無邊阿僧祇菩薩摩訶薩大眾，及信相菩薩、金光、金藏、常悲、法上等，及四天王、十千天子與道場菩提樹神地神堅牢等，及一切世間天、人、阿脩羅等，聞佛所說，皆發無上菩提之心，踊躍歡喜，作禮而去。', 宋: '', 元: '', 明: '', 宮: '', 聖: ''}
