body:
  text: 合部金光明經序金光明經者教窮滿字金鼓擊於夢中理極真空寶塔踊於地上三身果備酬昔報之無虧十地因圓顯曩修之具足所以經王之號得稱於斯將知能弘贊人其位難量者也大興善寺沙門釋寶貴者即近周世道安神足伏膺明匠寔曰良才翫閱群經未嘗釋手可謂瞿曇身子孔氏顏淵者焉然貴覩昔晉朝沙門支敏度合兩支兩竺一白五家首楞嚴五本為一部作八卷又合一支兩竺三家維摩三本為一部作五卷今沙門僧就又合二讖羅什耶舍四家大集四本為一部作六十卷非止收涓添海亦是聚芥培山諸此合經文義宛具斯既先哲遺蹤貴遂依承以為規矩而金光明見有三本初在涼世有曇無讖譯為四卷止十八品其次周世闍那崛多譯為五卷成二十品後逮梁世真諦三藏於建康譯三身分別業障滅陀羅尼最淨地依空滿願等四品足前出沒為二十二品其序果云曇無讖法師稱金光明經篇品闕漏每尋文揣義謂此說有徵而讐校無指永懷寤寐寶貴每歎此經祕奧後分云何竟無囑累舊雖三譯本疑未周長想梵文願言逢遇大隋馭㝢新經即來帝勅所司相續飜譯至開皇十七年法席小間因勸請北天竺揵陀羅國三藏法師此云志德重尋後本果有囑累品復得銀主陀羅尼品故知法典源散派別條分承注末流理難全具賴三藏法師慧性冲明學業優遠內外經論多所博通在京大興善寺即為飜譯并前先出合二十四品寫為八卷學士成都費長房筆受通梵沙門日嚴寺釋彥琮校練寶珠既足欣躍載深願此法燈傳之永劫
